<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LotPulse Lot Confirmation</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    :root {
      --bg: #0f172a;
      --panel: rgba(15, 23, 42, 0.94);
      --panel-2: rgba(30, 41, 59, 0.95);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --selected: #2563eb;
      --predicted: #f59e0b;
      --success: #22c55e;
      --danger: #ef4444;
      --location: #10b981;
      --home: #a855f7;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    #app {
      position: relative;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    #map {
      height: 100%;
      width: 100%;
    }

    .topbar {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 1000;
      background: var(--panel);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 18px;
      padding: 14px 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 4px;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .chip {
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid rgba(148, 163, 184, 0.16);
      background: var(--panel-2);
      color: var(--text);
    }

    .chip.predicted {
      border-color: rgba(245, 158, 11, 0.45);
      color: #fcd34d;
    }

    .chip.selected {
      border-color: rgba(37, 99, 235, 0.45);
      color: #93c5fd;
    }

    .chip.location {
      border-color: rgba(16, 185, 129, 0.45);
      color: #6ee7b7;
    }

    .chip.home {
      border-color: rgba(168, 85, 247, 0.45);
      color: #e9d5ff;
    }

    .legend {
      position: absolute;
      right: 12px;
      top: 126px;
      z-index: 1000;
      background: var(--panel);
      border-radius: 16px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      padding: 10px 12px;
      font-size: 12px;
      color: var(--muted);
      backdrop-filter: blur(10px);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 6px 0;
    }

    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 4px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--location);
      border: 2px solid white;
      box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.25);
    }

    .legend-home {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--home);
      border: 2px solid white;
      box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.25);
    }

    .sheet {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 1000;
      background: var(--panel);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 22px;
      padding: 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 -12px 30px rgba(0, 0, 0, 0.2);
    }

    .sheet h2 {
      margin: 0 0 4px;
      font-size: 18px;
    }

    .sheet p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .sheet-meta {
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.12);
      font-size: 13px;
      line-height: 1.6;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-secondary {
      background: rgba(51, 65, 85, 0.9);
      color: var(--text);
      border: 1px solid rgba(148, 163, 184, 0.16);
    }

    .btn-primary {
      background: var(--selected);
      color: white;
    }

    .btn-primary:disabled,
    .btn-secondary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      margin-top: 12px;
      font-size: 13px;
      min-height: 18px;
      font-weight: 600;
    }

    .status.error { color: #fca5a5; }
    .status.success { color: #86efac; }
    .status.info { color: #93c5fd; }

    @media (max-width: 640px) {
      .legend {
        top: auto;
        bottom: 216px;
        left: 12px;
        right: auto;
      }

      .buttons {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="map"></div>

    <div class="topbar">
      <p class="title" id="pageTitle">Confirm lot</p>
      <p class="subtitle" id="subtitle">Tap the correct lot on the map. The predicted lot is highlighted.</p>
      <div class="chips">
        <span class="chip predicted" id="predictedChip">Predicted: —</span>
        <span class="chip selected" id="selectedChip">Selected: —</span>
        <span class="chip location" id="locationChip">Location: unavailable</span>
        <span class="chip home" id="homeChip">Home: —</span>
      </div>
    </div>

    <div class="legend">
      <div class="legend-item"><span class="legend-swatch" style="background:#f59e0b"></span><span>Predicted lot</span></div>
      <div class="legend-item"><span class="legend-swatch" style="background:#2563eb"></span><span>Selected lot</span></div>
      <div class="legend-item"><span class="legend-swatch" style="background:#475569"></span><span>Other lots</span></div>
      <div class="legend-item"><span class="legend-dot"></span><span>Your location</span></div>
      <div class="legend-item"><span class="legend-home"></span><span>Home location</span></div>
    </div>

    <div class="sheet">
      <h2 id="sheetTitle">No lot selected</h2>
      <p id="sheetSubtitle">Tap any marked lot to continue.</p>

      <div class="sheet-meta" id="sheetMeta">
        Mode: —<br />
        Predicted lot: —<br />
        Selected lot: —
      </div>

      <div class="buttons">
        <button class="btn-secondary" id="recenterBtn" type="button">Recenter</button>
        <button class="btn-primary" id="confirmBtn" type="button" disabled>Confirm</button>
      </div>

      <div class="status info" id="status"></div>
    </div>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script>
    const params = new URLSearchParams(window.location.search);

    const userRef = params.get('user_ref') || '';
    const predictedLotId = String(params.get('predicted_lot_id') || '');
    const mode = (params.get('mode') || 'arrival').trim().toLowerCase();

    const homeLat = parseFloat(params.get('home_lat') || '');
    const homeLng = parseFloat(params.get('home_lng') || '');
    const homeLabel = params.get('home_label') || '—';

    const geojsonUrl = params.get('geojson') || './lots.geojson';
    const lotLookupCsvUrl =
      params.get('lot_lookup_csv') ||
      'https://docs.google.com/spreadsheets/d/e/2PACX-1vSMe68LcNpLQev2oeCkSkHhCyuk9XxRln0P8xddDPKXPEa8_oznimCGSPhud12uZRPx7GE5UmSE0hW7/pub?gid=1809032885&single=true&output=csv';

    const arrivalPostUrl =
      params.get('arrival_post_url') ||
      'https://lotpulse-server.onrender.com/api/events/arrival';

    const departurePostUrl =
      params.get('departure_post_url') ||
      'https://lotpulse-server.onrender.com/api/events/departure';

    const successRedirectUrl = params.get('success_redirect') || './index.html';
    const autoCloseDelayMs = Number(params.get('close_delay_ms') || '1800');

    const pageTitleEl = document.getElementById('pageTitle');
    const subtitleEl = document.getElementById('subtitle');
    const predictedChipEl = document.getElementById('predictedChip');
    const selectedChipEl = document.getElementById('selectedChip');
    const locationChipEl = document.getElementById('locationChip');
    const homeChipEl = document.getElementById('homeChip');
    const sheetTitleEl = document.getElementById('sheetTitle');
    const sheetSubtitleEl = document.getElementById('sheetSubtitle');
    const sheetMetaEl = document.getElementById('sheetMeta');
    const statusEl = document.getElementById('status');
    const confirmBtn = document.getElementById('confirmBtn');
    const recenterBtn = document.getElementById('recenterBtn');

    const isArrivalMode = mode === 'arrival';
    const confirmButtonLabel = isArrivalMode ? 'Confirm arrival' : 'Confirm departure';

    pageTitleEl.textContent = isArrivalMode ? 'Confirm arrival lot' : 'Confirm departure lot';
    confirmBtn.textContent = confirmButtonLabel;
    homeChipEl.textContent = `Home: ${homeLabel}`;

    const map = L.map('map', {
      zoomControl: true,
      preferCanvas: true
    }).setView([25.079, 55.161], 16);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 20,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let geojsonLayer = null;
    let selectedLot = null;
    let predictedBounds = null;
    let lotNameLookup = new Map();
    const lotLayers = new Map();
    let userLocationMarker = null;
    let homeLocationMarker = null;
    let userLatLng = null;

    function setStatus(text, type = 'info') {
      statusEl.textContent = text;
      statusEl.className = `status ${type}`;
    }

    function getInternalLotId(feature) {
      const p = feature.properties || {};
      return String(p.lot_id ?? p.Lot_ID ?? p.lotId ?? p.id ?? '');
    }

    function getDisplayLotNameFromId(lotId) {
      return lotNameLookup.get(String(lotId)) || `Lot ${lotId}`;
    }

    function parseCsvLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const next = line[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          result.push(current.trim());
          current = '';
        } else {
          current += char;
        }
      }

      result.push(current.trim());
      return result;
    }

    function parseCsv(text) {
      const lines = text
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean);

      if (lines.length < 2) return [];

      const headers = parseCsvLine(lines[0]);

      return lines.slice(1).map(line => {
        const values = parseCsvLine(line);
        const row = {};
        headers.forEach((header, i) => {
          row[header] = values[i] ?? '';
        });
        return row;
      });
    }

    async function loadLotMaster() {
      const res = await fetch(lotLookupCsvUrl);
      if (!res.ok) {
        throw new Error(`Failed to load lot lookup CSV: ${res.status}`);
      }

      const csvText = await res.text();
      const rows = parseCsv(csvText);

      lotNameLookup = new Map(
        rows
          .filter(row => row.Lot_ID && row.Lot_Name)
          .map(row => [String(row.Lot_ID).trim(), String(row.Lot_Name).trim()])
      );
    }

    function styleForLot(lotId) {
      const lotIdStr = String(lotId);
      const isSelected = selectedLot && String(selectedLot.lotId) === lotIdStr;
      const isPredicted = predictedLotId && String(predictedLotId) === lotIdStr;

      if (isSelected) {
        return {
          color: '#2563eb',
          weight: 4,
          fillColor: '#2563eb',
          fillOpacity: 0.35
        };
      }

      if (isPredicted) {
        return {
          color: '#f59e0b',
          weight: 4,
          fillColor: '#f59e0b',
          fillOpacity: 0.3,
          dashArray: '6,4'
        };
      }

      return {
        color: '#475569',
        weight: 2,
        fillColor: '#475569',
        fillOpacity: 0.18
      };
    }

    function updateAllStyles() {
      lotLayers.forEach((entry) => {
        entry.layer.setStyle(styleForLot(entry.lotId));
      });

      selectedChipEl.textContent = `Selected: ${selectedLot ? selectedLot.lotName : '—'}`;
      confirmBtn.disabled = !selectedLot;

      if (selectedLot) {
        sheetTitleEl.textContent = `Selected lot: ${selectedLot.lotName}`;
        sheetSubtitleEl.textContent = isArrivalMode
          ? 'Confirm arrival at this selected lot.'
          : 'Confirm departure from this selected lot.';
      } else {
        sheetTitleEl.textContent = 'No lot selected';
        sheetSubtitleEl.textContent = 'Tap any marked lot to continue.';
      }

      const predictedLotName = predictedLotId ? getDisplayLotNameFromId(predictedLotId) : '—';
      sheetMetaEl.innerHTML =
        `Mode: ${mode}<br />` +
        `Predicted lot: ${predictedLotName}<br />` +
        `Selected lot: ${selectedLot ? selectedLot.lotName : '—'}`;
    }

    function updateUserLocation(lat, lng) {
      userLatLng = L.latLng(lat, lng);

      if (userLocationMarker) {
        userLocationMarker.setLatLng(userLatLng);
      } else {
        userLocationMarker = L.circleMarker(userLatLng, {
          radius: 4,
          color: '#ffffff',
          weight: 2,
          fillColor: '#10b981',
          fillOpacity: 1,
          interactive: false,
          bubblingMouseEvents: false
        }).addTo(map);
      }

      locationChipEl.textContent = 'Location: active';
    }

    function requestUserLocation() {
      if (!navigator.geolocation) {
        locationChipEl.textContent = 'Location: unavailable';
        return;
      }

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          updateUserLocation(
            pos.coords.latitude,
            pos.coords.longitude
          );
        },
        () => {
          locationChipEl.textContent = 'Location: denied';
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 30000
        }
      );
    }

    function addHomeMarker() {
      if (Number.isFinite(homeLat) && Number.isFinite(homeLng)) {
        homeLocationMarker = L.circleMarker([homeLat, homeLng], {
          radius: 5,
          color: '#ffffff',
          weight: 2,
          fillColor: '#a855f7',
          fillOpacity: 1,
          interactive: false,
          bubblingMouseEvents: false
        }).addTo(map);

        homeLocationMarker.bindPopup(`<strong>${homeLabel || 'Home'}</strong>`);
      }
    }

    async function loadLots() {
      setStatus('Loading lot map…', 'info');

      await loadLotMaster();

      const predictedLotName = predictedLotId ? getDisplayLotNameFromId(predictedLotId) : '—';
      predictedChipEl.textContent = `Predicted: ${predictedLotName}`;
      subtitleEl.textContent = isArrivalMode
        ? `Tap the lot where you actually parked. Predicted lot ${predictedLotName} is highlighted.`
        : `Tap the correct departure lot. Predicted lot ${predictedLotName} is highlighted.`;

      const res = await fetch(geojsonUrl);
      if (!res.ok) {
        throw new Error(`Failed to load GeoJSON: ${res.status}`);
      }

      const data = await res.json();

      geojsonLayer = L.geoJSON(data, {
        style: (feature) => {
          const lotId = getInternalLotId(feature);
          return styleForLot(lotId);
        },
        onEachFeature: (feature, layer) => {
          const lotId = getInternalLotId(feature);
          const lotName = getDisplayLotNameFromId(lotId);

          lotLayers.set(lotId, {
            layer,
            lotId,
            lotName
          });

          layer.bindTooltip(lotName, {
            sticky: true,
            direction: 'center',
            opacity: 0.9
          });

          layer.on('click', () => {
            selectedLot = {
              lotId,
              lotName
            };
            updateAllStyles();
            setStatus(
              isArrivalMode
                ? `Selected ${lotName}. Confirm to submit arrival.`
                : `Selected ${lotName}. Confirm to submit departure.`,
              'info'
            );
          });

          if (String(lotId) === String(predictedLotId)) {
            predictedBounds = layer.getBounds();
          }
        }
      }).addTo(map);

      const bounds = geojsonLayer.getBounds();

      if (predictedBounds && predictedBounds.isValid()) {
        map.fitBounds(predictedBounds.pad(0.8));
      } else if (bounds.isValid()) {
        map.fitBounds(bounds.pad(0.15));
      }

      addHomeMarker();
      updateAllStyles();
      requestUserLocation();
      setStatus('Tap a lot, then confirm.', 'info');
    }

    function finishAndExit() {
      setTimeout(() => {
        try {
          window.close();
        } catch (_) {}

        setTimeout(() => {
          window.location.href = successRedirectUrl;
        }, 300);
      }, autoCloseDelayMs);
    }

    async function confirmSelection() {
      if (!selectedLot) {
        setStatus('Select a lot first.', 'error');
        return;
      }

      if (!userRef) {
        setStatus('Missing user_ref.', 'error');
        return;
      }

      confirmBtn.disabled = true;
      recenterBtn.disabled = true;

      setStatus(
        isArrivalMode
          ? `Submitting arrival for ${selectedLot.lotName}…`
          : `Submitting departure for ${selectedLot.lotName}…`,
        'info'
      );

      try {
        const payload = {
          user_ref: userRef,
          lot_id: selectedLot.lotId,
          predicted_lot_id: predictedLotId || '',
          event_type: isArrivalMode ? 'arrival_confirmed' : 'departure_confirmed',
          timestamp: new Date().toISOString(),
          source: isArrivalMode ? 'ios_map_corrected_lot' : 'ios_map_corrected_lot',
          user_lat: userLatLng ? userLatLng.lat : null,
          user_lng: userLatLng ? userLatLng.lng : null,
          notes: isArrivalMode
            ? 'user corrected inbound lot from shortcut'
            : 'user corrected departure lot from shortcut'
        };

        const targetUrl = isArrivalMode ? arrivalPostUrl : departurePostUrl;

        const res = await fetch(targetUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const rawText = await res.text();

        let data;
        try {
          data = JSON.parse(rawText);
        } catch {
          throw new Error(`Server did not return JSON. Raw response: ${rawText.slice(0, 300)}`);
        }

        if (!res.ok || !data.ok) {
          throw new Error(data.error || `Request failed: ${res.status}`);
        }

        setStatus(
          isArrivalMode ? 'Arrival confirmed.' : 'Departure confirmed.',
          'success'
        );

        sheetSubtitleEl.textContent = isArrivalMode
          ? 'Arrival confirmed. Closing this page…'
          : 'Departure confirmed. Closing this page…';

        finishAndExit();
      } catch (err) {
        setStatus(`Submission failed: ${err.message || 'unknown error'}`, 'error');
        console.error(err);
        confirmBtn.disabled = false;
        recenterBtn.disabled = false;
      }
    }

    recenterBtn.addEventListener('click', () => {
      const layers = [];

      if (geojsonLayer) layers.push(geojsonLayer);
      if (homeLocationMarker) layers.push(homeLocationMarker);
      if (userLocationMarker) layers.push(userLocationMarker);

      const group = L.featureGroup(layers);
      if (group.getLayers().length) {
        map.fitBounds(group.getBounds().pad(0.12));
      }
    });

    confirmBtn.addEventListener('click', confirmSelection);

    loadLots().catch((err) => {
      setStatus(err.message, 'error');
      console.error(err);
    });
  </script>
</body>
</html>

<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
  crossorigin=""
></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const predictedLotId = String(params.get('predicted_id') || '12');
  const userId = params.get('user_id') || 'j';
  const mode = params.get('mode') || 'departure';
  const geojsonUrl = params.get('geojson') || './lots.geojson';
  const lotMasterUrl = params.get('lot_master') || './lot-master.json';
  const postUrl = params.get('post_url') || 'https://lotpulse-server.onrender.com/api/events/departure';

  const subtitleEl = document.getElementById('subtitle');
  const predictedChipEl = document.getElementById('predictedChip');
  const selectedChipEl = document.getElementById('selectedChip');
  const sheetTitleEl = document.getElementById('sheetTitle');
  const sheetSubtitleEl = document.getElementById('sheetSubtitle');
  const sheetMetaEl = document.getElementById('sheetMeta');
  const statusEl = document.getElementById('status');
  const confirmBtn = document.getElementById('confirmBtn');
  const recenterBtn = document.getElementById('recenterBtn');

  const map = L.map('map', {
    zoomControl: true,
    preferCanvas: true
  }).setView([25.079, 55.161], 16);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 20,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  let geojsonLayer = null;
  let selectedLot = null;
  let predictedBounds = null;
  let lotNameLookup = new Map();
  const lotLayers = new Map();

  function setStatus(text, type = 'info') {
    statusEl.textContent = text;
    statusEl.className = `status ${type}`;
  }

  function getInternalLotId(feature) {
    const p = feature.properties || {};
    return String(p.lot_id ?? p.Lot_ID ?? p.lotId ?? p.id ?? '');
  }

  function getDisplayLotNameFromId(lotId) {
    return lotNameLookup.get(String(lotId)) || `Lot ${lotId}`;
  }

  function styleForLot(lotId) {
    const lotIdStr = String(lotId);
    const isSelected = selectedLot && String(selectedLot.lotId) === lotIdStr;
    const isPredicted = String(predictedLotId) === lotIdStr;

    if (isSelected) {
      return {
        color: '#2563eb',
        weight: 4,
        fillColor: '#2563eb',
        fillOpacity: 0.35
      };
    }

    if (isPredicted) {
      return {
        color: '#f59e0b',
        weight: 4,
        fillColor: '#f59e0b',
        fillOpacity: 0.3,
        dashArray: '6,4'
      };
    }

    return {
      color: '#475569',
      weight: 2,
      fillColor: '#475569',
      fillOpacity: 0.18
    };
  }

  function updateAllStyles() {
    lotLayers.forEach((entry) => {
      entry.layer.setStyle(styleForLot(entry.lotId));
    });

    selectedChipEl.textContent = `Selected: ${selectedLot ? selectedLot.lotName : '—'}`;
    confirmBtn.disabled = !selectedLot;

    if (selectedLot) {
      sheetTitleEl.textContent = `Selected lot: ${selectedLot.lotName}`;
      sheetSubtitleEl.textContent = 'Confirm departure from this selected lot.';
    } else {
      sheetTitleEl.textContent = 'No lot selected';
      sheetSubtitleEl.textContent = 'Tap any marked lot to continue.';
    }
  }

  async function loadLotMaster() {
    const res = await fetch(lotMasterUrl);
    if (!res.ok) {
      throw new Error(`Failed to load lot master: ${res.status}`);
    }

    const data = await res.json();
    lotNameLookup = new Map(
      data.map(item => [String(item.lot_id), item.lot_name])
    );
  }

  async function loadLots() {
    setStatus('Loading lot map…', 'info');

    await loadLotMaster();

    const predictedLotName = getDisplayLotNameFromId(predictedLotId);
    predictedChipEl.textContent = `Predicted: ${predictedLotName}`;
    sheetMetaEl.innerHTML = `User: ${userId}<br />Mode: ${mode}<br />Predicted lot: ${predictedLotName}`;
    subtitleEl.textContent = `Tap the correct lot on the map. Predicted lot ${predictedLotName} is highlighted.`;

    const res = await fetch(geojsonUrl);
    if (!res.ok) {
      throw new Error(`Failed to load GeoJSON: ${res.status}`);
    }

    const data = await res.json();

    geojsonLayer = L.geoJSON(data, {
      style: (feature) => {
        const lotId = getInternalLotId(feature);
        return styleForLot(lotId);
      },
      onEachFeature: (feature, layer) => {
        const lotId = getInternalLotId(feature);
        const lotName = getDisplayLotNameFromId(lotId);

        lotLayers.set(lotId, {
          layer,
          lotId,
          lotName
        });

        layer.bindTooltip(lotName, {
          sticky: true,
          direction: 'center',
          opacity: 0.9
        });

        layer.on('click', () => {
          selectedLot = {
            lotId,
            lotName
          };
          updateAllStyles();
          setStatus(`Selected ${lotName}. Confirm to submit departure.`, 'info');
        });

        if (String(lotId) === String(predictedLotId)) {
          predictedBounds = layer.getBounds();
        }
      }
    }).addTo(map);

    const bounds = geojsonLayer.getBounds();

    if (predictedBounds && predictedBounds.isValid()) {
      map.fitBounds(predictedBounds.pad(0.8));
    } else if (bounds.isValid()) {
      map.fitBounds(bounds.pad(0.15));
    }

    updateAllStyles();
    setStatus('Tap a lot, then confirm departure.', 'info');
  }

  async function confirmDeparture() {
    if (!selectedLot) {
      setStatus('Select a lot first.', 'error');
      return;
    }

    confirmBtn.disabled = true;
    setStatus(`Submitting departure for ${selectedLot.lotName}…`, 'info');

    try {
      const payload = {
        user_id: userId,
        lot_id: selectedLot.lotId,
        lot_name: selectedLot.lotName,
        event_type: 'departure_confirmed',
        timestamp: new Date().toISOString(),
        source: 'ios_map_corrected_lot'
      };

      const res = await fetch(postUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const data = await res.json();

      if (!res.ok || !data.ok) {
        throw new Error(data.error || `Request failed: ${res.status}`);
      }

      setStatus(`Departure logged for ${selectedLot.lotName}.`, 'success');
      sheetSubtitleEl.textContent = 'Departure logged successfully.';
    } catch (err) {
      setStatus(`Submission failed: ${err.message || 'unknown error'}`, 'error');
      console.error(err);
    } finally {
      confirmBtn.disabled = false;
    }
  }

  recenterBtn.addEventListener('click', () => {
    if (predictedBounds && predictedBounds.isValid()) {
      map.fitBounds(predictedBounds.pad(0.8));
    } else if (geojsonLayer) {
      map.fitBounds(geojsonLayer.getBounds().pad(0.15));
    }
  });

  confirmBtn.addEventListener('click', confirmDeparture);

  loadLots().catch((err) => {
    setStatus(err.message, 'error');
    console.error(err);
  });
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LotPulse Departure Selection</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <style>
    :root {
      --bg: #0f172a;
      --panel: rgba(15, 23, 42, 0.94);
      --panel-2: rgba(30, 41, 59, 0.95);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #a855f7;
      --success: #22c55e;
      --warn: #f59e0b;
      --danger: #ef4444;
      --selected: #2563eb;
      --predicted: #f59e0b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    #app {
      position: relative;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    #map {
      height: 100%;
      width: 100%;
    }

    .topbar {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 1000;
      background: var(--panel);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 18px;
      padding: 14px 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 4px;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .chip {
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid rgba(148, 163, 184, 0.16);
      background: var(--panel-2);
      color: var(--text);
    }

    .chip.predicted {
      border-color: rgba(245, 158, 11, 0.45);
      color: #fcd34d;
    }

    .chip.selected {
      border-color: rgba(37, 99, 235, 0.45);
      color: #93c5fd;
    }

    .sheet {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 1000;
      background: var(--panel);
      border: 1px solid rgba(148, 163, 184, 0.18);
      border-radius: 22px;
      padding: 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 -12px 30px rgba(0, 0, 0, 0.2);
    }

    .sheet-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .sheet h2 {
      margin: 0 0 4px;
      font-size: 18px;
    }

    .sheet p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .sheet-meta {
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.12);
      font-size: 13px;
      line-height: 1.6;
    }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-secondary {
      background: rgba(51, 65, 85, 0.9);
      color: var(--text);
      border: 1px solid rgba(148, 163, 184, 0.16);
    }

    .btn-primary {
      background: var(--selected);
      color: white;
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      margin-top: 12px;
      font-size: 13px;
      min-height: 18px;
    }

    .status.error { color: #fca5a5; }
    .status.success { color: #86efac; }
    .status.info { color: #93c5fd; }

    .legend {
      position: absolute;
      right: 12px;
      top: 126px;
      z-index: 1000;
      background: var(--panel);
      border-radius: 16px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      padding: 10px 12px;
      font-size: 12px;
      color: var(--muted);
      backdrop-filter: blur(10px);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 6px 0;
    }

    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 4px;
    }

    @media (max-width: 640px) {
      .legend {
        top: auto;
        bottom: 216px;
        left: 12px;
        right: auto;
      }

      .buttons {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="map"></div>

    <div class="topbar">
      <p class="title">Confirm departure lot</p>
      <p class="subtitle" id="subtitle">Tap the correct lot on the map. The predicted lot is highlighted.</p>
      <div class="chips">
        <span class="chip predicted" id="predictedChip">Predicted: —</span>
        <span class="chip selected" id="selectedChip">Selected: —</span>
      </div>
    </div>

    <div class="legend">
      <div class="legend-item">
        <span class="legend-swatch" style="background:#f59e0b"></span>
        <span>Predicted lot</span>
      </div>
      <div class="legend-item">
        <span class="legend-swatch" style="background:#2563eb"></span>
        <span>Selected lot</span>
      </div>
      <div class="legend-item">
        <span class="legend-swatch" style="background:#475569"></span>
        <span>Other lots</span>
      </div>
    </div>

    <div class="sheet">
      <div class="sheet-row">
        <div>
          <h2 id="sheetTitle">No lot selected</h2>
          <p id="sheetSubtitle">Tap any marked lot to continue.</p>
        </div>
      </div>

      <div class="sheet-meta" id="sheetMeta">
        User: —<br />
        Mode: departure<br />
        Predicted lot: —
      </div>

      <div class="buttons">
        <button class="btn-secondary" id="recenterBtn" type="button">Recenter</button>
        <button class="btn-primary" id="confirmBtn" type="button" disabled>Confirm departure</button>
      </div>

      <div class="status info" id="status"></div>
    </div>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const predictedLotName = params.get('predicted_name') || 'FRA 12';
    const userId = params.get('user_id') || 'j';
    const mode = params.get('mode') || 'departure';
    const geojsonUrl = params.get('geojson') || './lots.geojson';
    const postUrl = params.get('post_url') || 'https://lotpulse-server.onrender.com/api/events/departure';

    const subtitleEl = document.getElementById('subtitle');
    const predictedChipEl = document.getElementById('predictedChip');
    const selectedChipEl = document.getElementById('selectedChip');
    const sheetTitleEl = document.getElementById('sheetTitle');
    const sheetSubtitleEl = document.getElementById('sheetSubtitle');
    const sheetMetaEl = document.getElementById('sheetMeta');
    const statusEl = document.getElementById('status');
    const confirmBtn = document.getElementById('confirmBtn');
    const recenterBtn = document.getElementById('recenterBtn');

    predictedChipEl.textContent = `Predicted: ${predictedLotName}`;
    sheetMetaEl.innerHTML = `User: ${userId}<br />Mode: ${mode}<br />Predicted lot: ${predictedLotName}`;
    subtitleEl.textContent = `Tap the correct lot on the map. Predicted lot ${predictedLotName} is highlighted.`;

    const map = L.map('map', {
      zoomControl: true,
      preferCanvas: true
    }).setView([25.079, 55.161], 16);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 20,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let geojsonLayer = null;
    let selectedLot = null;
    let predictedBounds = null;
    const lotLayers = new Map();

    function getInternalLotId(feature) {
      const p = feature.properties || {};
      return p.lot_id || p.Lot_ID || p.lotId || p.id || null;
    }

    function getDisplayLotName(feature) {
      const p = feature.properties || {};
      return p.Lot_Name || p.lot_name || p.name || String(getInternalLotId(feature) ?? 'UNKNOWN');
    }

    function styleForLot(lotId, displayName) {
      const isSelected = selectedLot && selectedLot.lotId === lotId;
      const isPredicted = predictedLotName === displayName;

      if (isSelected) {
        return {
          color: '#2563eb',
          weight: 4,
          fillColor: '#2563eb',
          fillOpacity: 0.35
        };
      }

      if (isPredicted) {
        return {
          color: '#f59e0b',
          weight: 4,
          fillColor: '#f59e0b',
          fillOpacity: 0.3,
          dashArray: '6,4'
        };
      }

      return {
        color: '#475569',
        weight: 2,
        fillColor: '#475569',
        fillOpacity: 0.18
      };
    }

    function updateAllStyles() {
      lotLayers.forEach((entry) => {
        entry.layer.setStyle(styleForLot(entry.lotId, entry.lotName));
      });

      selectedChipEl.textContent = `Selected: ${selectedLot ? selectedLot.lotName : '—'}`;
      confirmBtn.disabled = !selectedLot;

      if (selectedLot) {
        sheetTitleEl.textContent = `Selected lot: ${selectedLot.lotName}`;
        sheetSubtitleEl.textContent = 'Confirm departure from this selected lot.';
      } else {
        sheetTitleEl.textContent = 'No lot selected';
        sheetSubtitleEl.textContent = 'Tap any marked lot to continue.';
      }
    }

    function setStatus(text, type = 'info') {
      statusEl.textContent = text;
      statusEl.className = `status ${type}`;
    }

    async function loadLots() {
      setStatus('Loading lot map…', 'info');

      const res = await fetch(geojsonUrl);
      if (!res.ok) {
        throw new Error(`Failed to load GeoJSON: ${res.status}`);
      }

      const data = await res.json();

      geojsonLayer = L.geoJSON(data, {
        style: (feature) => {
          const lotId = getInternalLotId(feature);
          const displayName = getDisplayLotName(feature);
          return styleForLot(lotId, displayName);
        },
        onEachFeature: (feature, layer) => {
          const lotId = getInternalLotId(feature);
          const displayName = getDisplayLotName(feature);

          lotLayers.set(lotId, {
            layer,
            lotId,
            lotName: displayName
          });

          layer.bindTooltip(`${displayName}`, {
            sticky: true,
            direction: 'center',
            opacity: 0.9
          });

          layer.on('click', () => {
            selectedLot = {
              lotId,
              lotName: displayName
            };
            updateAllStyles();
            setStatus(`Selected ${displayName}. Confirm to submit departure.`, 'info');
          });

          if (displayName === predictedLotName) {
            predictedBounds = layer.getBounds();
          }
        }
      }).addTo(map);

      const bounds = geojsonLayer.getBounds();

      if (predictedBounds && predictedBounds.isValid()) {
        map.fitBounds(predictedBounds.pad(0.8));
      } else if (bounds.isValid()) {
        map.fitBounds(bounds.pad(0.15));
      }

      updateAllStyles();
      setStatus('Tap a lot, then confirm departure.', 'info');
    }

    async function confirmDeparture() {
      if (!selectedLot) {
        setStatus('Select a lot first.', 'error');
        return;
      }

      confirmBtn.disabled = true;
      setStatus(`Submitting departure for ${selectedLot.lotName}…`, 'info');

      try {
        const payload = {
          user_id: userId,
          lot_id: selectedLot.lotId,
          lot_name: selectedLot.lotName,
          event_type: 'departure_confirmed',
          timestamp: new Date().toISOString(),
          source: 'ios_map_corrected_lot'
        };

        const res = await fetch(postUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          throw new Error(data.error || `Request failed: ${res.status}`);
        }

        setStatus(`Departure logged for ${selectedLot.lotName}.`, 'success');
        sheetSubtitleEl.textContent = 'Departure logged successfully.';
      } catch (err) {
        setStatus(`Submission failed: ${err.message || 'unknown error'}`, 'error');
        console.error(err);
      } finally {
        confirmBtn.disabled = false;
      }
    }

    recenterBtn.addEventListener('click', () => {
      if (predictedBounds && predictedBounds.isValid()) {
        map.fitBounds(predictedBounds.pad(0.8));
      } else if (geojsonLayer) {
        map.fitBounds(geojsonLayer.getBounds().pad(0.15));
      }
    });

    confirmBtn.addEventListener('click', confirmDeparture);

    loadLots().catch((err) => {
      setStatus(err.message, 'error');
      console.error(err);
    });
  </script>
</body>
</html>

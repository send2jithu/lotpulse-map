<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LotPulse Live Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #0b1220;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    .panel {
      position: absolute;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.84);
      color: white;
      border-radius: 10px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.22);
    }

    .topbar {
      top: 14px;
      left: 14px;
      padding: 12px;
      min-width: 280px;
      max-width: min(480px, calc(100vw - 28px));
    }

    .topbar strong {
      display: block;
      margin-bottom: 6px;
      font-size: 15px;
    }

    .legend {
      right: 14px;
      bottom: 14px;
      padding: 10px;
      font-size: 12px;
    }

    .legend div {
      margin: 4px 0;
    }

    .controls {
      margin-top: 10px;
      display: grid;
      gap: 8px;
    }

    .controls select,
    .controls input,
    .controls button {
      width: 100%;
      padding: 7px 8px;
      border-radius: 6px;
      border: none;
      box-sizing: border-box;
      font: inherit;
    }

    .controls button {
      cursor: pointer;
      background: #2563eb;
      color: white;
      font-weight: 600;
    }

    .controls button.secondary {
      background: #374151;
    }

    #status {
      font-size: 12px;
      line-height: 1.45;
      color: #d1d5db;
      white-space: pre-line;
    }

    .error {
      color: #fecaca !important;
    }

    .hint {
      color: #93c5fd;
    }

    .lot-label {
      background: rgba(255, 255, 255, 0.96);
      border-radius: 6px;
      padding: 2px 4px;
      font-size: 10px;
      font-weight: bold;
      text-align: center;
      border: 1px solid rgba(0, 0, 0, 0.12);
      line-height: 1.15;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
      color: #111827;
      white-space: nowrap;
    }

    @media (max-width: 640px) {
      .topbar {
        min-width: 0;
        width: calc(100vw - 28px);
      }
    }
  </style>
</head>
<body>
  <div class="panel topbar">
    <strong>LotPulse Live Map</strong>
    <div id="status">Loading...</div>
    <div class="controls">
      <select id="clusterFilter">
        <option value="ALL">All</option>
        <option value="France">France</option>
        <option value="Spain">Spain</option>
        <option value="Italy">Italy</option>
        <option value="Russia">Russia</option>
        <option value="Emirates">Emirates</option>
      </select>
      <input id="csvUrlInput" type="text" placeholder="Optional CSV URL for live sheet data" />
      <input id="csvFileInput" type="file" accept=".csv,text/csv" />
      <input id="geojsonUrlInput" type="text" placeholder="GeoJSON URL or leave blank to use local lots.geojson" />
      <input id="geojsonFileInput" type="file" accept=".geojson,.json,application/geo+json,application/json" />
      <button id="reloadButton" type="button">Reload map data</button>
      <button id="useLocalButton" class="secondary" type="button">Use local lots.geojson</button>
    </div>
  </div>

  <div id="map"></div>

  <div class="panel legend">
    <div>Green = High</div>
    <div>Orange = Low</div>
    <div>Red = Full</div>
    <div>Grey = Unknown / Inactive</div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const DEFAULT_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSMe68LcNpLQev2oeCkSkHhCyuk9XxRln0P8xddDPKXPEa8_oznimCGSPhud12uZRPx7GE5UmSE0hW7/pub?gid=1449202579&single=true&output=csv';
    const DEFAULT_GEOJSON_URL = 'lots.geojson';
    const LABEL_ZOOM_THRESHOLD = 17;

    const FALLBACK_CSV = `Lot_ID,Cluster_Name,Cluster_Code,Cluster_Lot,Lot_Name,Total_Slots,Available_Slots,Status
1,France,FRA,1,FRA 1,100,23,ACTIVE
2,France,FRA,2,FRA 2,100,13,ACTIVE
3,Spain,SPA,1,SPA 1,100,64,ACTIVE
4,Russia,RUS,1,RUS 1,100,31,ACTIVE`;

    const FALLBACK_GEOJSON = {
      type: 'FeatureCollection',
      features: [
        {
          type: 'Feature',
          properties: { Lot_ID: 1 },
          geometry: {
            type: 'Polygon',
            coordinates: [[
              [55.4033, 25.1618],
              [55.4037, 25.1618],
              [55.4037, 25.1615],
              [55.4033, 25.1615],
              [55.4033, 25.1618]
            ]]
          }
        },
        {
          type: 'Feature',
          properties: { Lot_ID: 2 },
          geometry: {
            type: 'Polygon',
            coordinates: [[
              [55.40385, 25.1618],
              [55.40425, 25.1618],
              [55.40425, 25.1615],
              [55.40385, 25.1615],
              [55.40385, 25.1618]
            ]]
          }
        },
        {
          type: 'Feature',
          properties: { Lot_ID: 3 },
          geometry: {
            type: 'Polygon',
            coordinates: [[
              [55.4044, 25.1618],
              [55.4048, 25.1618],
              [55.4048, 25.1615],
              [55.4044, 25.1615],
              [55.4044, 25.1618]
            ]]
          }
        },
        {
          type: 'Feature',
          properties: { Lot_ID: 4 },
          geometry: {
            type: 'Polygon',
            coordinates: [[
              [55.40495, 25.1618],
              [55.40535, 25.1618],
              [55.40535, 25.1615],
              [55.40495, 25.1615],
              [55.40495, 25.1618]
            ]]
          }
        }
      ]
    };

    const map = L.map('map');
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 20,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let geojsonData = null;
    let sheetMap = new Map();
    let layer = null;
    let labelLayer = L.layerGroup().addTo(map);
    let hasFitBounds = false;
    let currentGeoJsonSource = DEFAULT_GEOJSON_URL;
    let currentSheetSource = DEFAULT_SHEET_CSV_URL || '[embedded fallback CSV]';
    let lastGeoJsonWarning = '';
    let lastSheetWarning = '';

    const statusEl = document.getElementById('status');
    const filterEl = document.getElementById('clusterFilter');
    const csvUrlInputEl = document.getElementById('csvUrlInput');
    const csvFileInputEl = document.getElementById('csvFileInput');
    const geojsonUrlInputEl = document.getElementById('geojsonUrlInput');
    const geojsonFileInputEl = document.getElementById('geojsonFileInput');
    const reloadButtonEl = document.getElementById('reloadButton');
    const useLocalButtonEl = document.getElementById('useLocalButton');

    function setStatus(message, isError = false, isHint = false) {
      statusEl.textContent = message;
      statusEl.classList.toggle('error', isError);
      statusEl.classList.toggle('hint', isHint && !isError);
    }

    function resolveUrl(url) {
      return new URL(url, window.location.href).toString();
    }

    function toErrorMessage(error) {
      if (!error) return 'Unknown error';
      if (typeof error === 'string') return error;
      if (typeof error.message === 'string' && error.message.trim()) return error.message;
      try {
        return String(error);
      } catch {
        return 'Unknown error';
      }
    }

    function cloneFeatureCollection(featureCollection) {
      return JSON.parse(JSON.stringify(featureCollection));
    }

    function getGeoJsonSourceFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const value = params.get('geojson');
      return value && value.trim() ? value.trim() : null;
    }

    function getCsvSourceFromQuery() {
      const params = new URLSearchParams(window.location.search);
      const value = params.get('csv');
      return value && value.trim() ? value.trim() : null;
    }

    function getRequestedGeoJsonSource() {
      const inputValue = geojsonUrlInputEl.value.trim();
      if (inputValue) return inputValue;
      return currentGeoJsonSource || DEFAULT_GEOJSON_URL;
    }

    function getRequestedCsvSource() {
      const inputValue = csvUrlInputEl.value.trim();
      if (inputValue) return inputValue;
      return DEFAULT_SHEET_CSV_URL;
    }

    async function fetchText(url) {
      const resolvedUrl = resolveUrl(url);
      let response;
      try {
        response = await fetch(resolvedUrl, { cache: 'no-store' });
      } catch (error) {
        throw new Error(`Network error while fetching ${resolvedUrl}: ${toErrorMessage(error)}`);
      }

      if (!response.ok) {
        throw new Error(`Failed to fetch ${resolvedUrl}: ${response.status} ${response.statusText}`);
      }

      try {
        return await response.text();
      } catch (error) {
        throw new Error(`Failed reading response body from ${resolvedUrl}: ${toErrorMessage(error)}`);
      }
    }

    async function fetchJson(url) {
      const text = await fetchText(url);
      try {
        return JSON.parse(text);
      } catch (error) {
        throw new Error(`Invalid JSON in ${url}: ${toErrorMessage(error)}`);
      }
    }

    async function readFileAsText(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ''));
        reader.onerror = () => reject(new Error(`Failed to read file: ${file.name}`));
        reader.readAsText(file);
      });
    }

    function parseCSV(text) {
      const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
      if (lines.length === 0) return [];

      const headerIndex = lines.findIndex(line => {
        const cols = splitCSVLine(line).map(v => sanitizeHeader(v));
        return cols.includes('Lot_ID');
      });

      if (headerIndex === -1) {
        throw new Error('CSV header row containing Lot_ID was not found.');
      }

      const headers = splitCSVLine(lines[headerIndex]).map(value => sanitizeHeader(value));
      const rows = [];

      for (let i = headerIndex + 1; i < lines.length; i += 1) {
        const values = splitCSVLine(lines[i]);
        if (values.every(value => value.trim() === '')) continue;

        const row = {};
        headers.forEach((header, index) => {
          row[header] = (values[index] ?? '').trim();
        });
        rows.push(row);
      }

      return rows;
    }

    function splitCSVLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;

      for (let i = 0; i < line.length; i += 1) {
        const char = line[i];
        const next = line[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            current += '"';
            i += 1;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          result.push(current);
          current = '';
        } else {
          current += char;
        }
      }

      result.push(current);
      return result;
    }

    function sanitizeHeader(value) {
      return String(value || '').replace(/^\uFEFF/, '').trim();
    }

    function normalize(rows) {
      const normalizedMap = new Map();

      rows.forEach(row => {
        const id = Number(row.Lot_ID);
        if (!Number.isFinite(id)) return;

        normalizedMap.set(id, {
          lot_id: id,
          cluster: row.Cluster_Name || '',
          clusterCode: row.Cluster_Code || '',
          clusterLot: row.Cluster_Lot || '',
          lotName: row.Lot_Name || `Lot ${id}`,
          available: Number(row.Available_Slots) || 0,
          total: Number(row.Total_Slots) || 0,
          status: String(row.Status || '').trim().toUpperCase() || 'UNKNOWN'
        });
      });

      return normalizedMap;
    }

    function getFeatureLotId(feature) {
      const properties = feature && feature.properties ? feature.properties : {};
      const rawValue = properties.Lot_ID ?? properties.lot_id ?? properties.LOT_ID ?? properties.LotId ?? properties.lotId;
      const id = Number(rawValue);
      return Number.isFinite(id) ? id : null;
    }

    function getColor(available, total, status) {
      if (status !== 'ACTIVE') return '#64748b';
      if (!Number.isFinite(total) || total <= 0) return '#64748b';

      const ratio = available / total;
      if (ratio <= 0.1) return '#dc2626';
      if (ratio <= 0.3) return '#f59e0b';
      return '#16a34a';
    }

    function buildPopupHtml(row, id) {
      const lotName = row?.lotName || `Lot ${id}`;
      const cluster = row?.cluster || '-';
      const available = row?.available ?? 0;
      const total = row?.total ?? 0;
      const status = row?.status || 'UNKNOWN';

      return `
        <strong>${escapeHtml(lotName)}</strong><br>
        Lot ID: ${id}<br>
        Cluster: ${escapeHtml(cluster)}<br>
        Availability: ${available}/${total}<br>
        Status: ${escapeHtml(status)}
      `;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function clearLayers() {
      if (layer) {
        map.removeLayer(layer);
        layer = null;
      }
      labelLayer.clearLayers();
    }

    function clearDataAndLayers() {
      geojsonData = null;
      clearLayers();
      hasFitBounds = false;
    }

    function render() {
      if (!geojsonData || !Array.isArray(geojsonData.features)) {
        setStatus('GeoJSON data is missing or invalid.', true);
        clearLayers();
        return;
      }

      clearLayers();

      const selectedCluster = filterEl.value;
      let renderedCount = 0;

      layer = L.geoJSON(geojsonData, {
        style: feature => {
          const id = getFeatureLotId(feature);
          const row = id !== null ? sheetMap.get(id) : null;

          return {
            color: '#111827',
            weight: 1,
            fillColor: getColor(row?.available, row?.total, row?.status),
            fillOpacity: 0.5
          };
        },
        filter: feature => {
          const id = getFeatureLotId(feature);
          const row = id !== null ? sheetMap.get(id) : null;

          if (!row) return selectedCluster === 'ALL';
          if (selectedCluster === 'ALL') return true;
          return row.cluster === selectedCluster;
        },
        onEachFeature: (feature, leafletLayer) => {
          const id = getFeatureLotId(feature);
          const row = id !== null ? sheetMap.get(id) : null;
          renderedCount += 1;

          const available = row?.available ?? 0;
          const total = row?.total ?? 0;
          const labelName = row?.lotName || `Lot ${id ?? '?'}`;

          leafletLayer.bindPopup(buildPopupHtml(row, id ?? '?'));

          if (map.getZoom() >= LABEL_ZOOM_THRESHOLD) {
            const center = leafletLayer.getBounds().getCenter();
            labelLayer.addLayer(L.marker(center, {
              interactive: false,
              icon: L.divIcon({
                className: 'lot-label',
                html: `${escapeHtml(labelName)}<br>${available}/${total}`
              })
            }));
          }
        }
      }).addTo(map);

      if (!hasFitBounds && layer.getBounds().isValid()) {
        map.fitBounds(layer.getBounds(), { padding: [20, 20] });
        hasFitBounds = true;
      }

      const warnings = [lastSheetWarning, lastGeoJsonWarning].filter(Boolean);
      const warningSuffix = warnings.length ? `\n${warnings.join('\n')}` : '';
      setStatus(`Loaded ${renderedCount} lots • Zoom ${map.getZoom()} • Filter ${selectedCluster}\nCSV source: ${currentSheetSource}\nGeoJSON source: ${currentGeoJsonSource}${warningSuffix}`);
    }

    async function loadGeoJsonFromSource(source) {
      currentGeoJsonSource = source;
      geojsonUrlInputEl.value = source === DEFAULT_GEOJSON_URL ? '' : source;
      return fetchJson(source);
    }

    async function loadGeoJsonFromFile(file) {
      const text = await readFileAsText(file);
      currentGeoJsonSource = `[file] ${file.name}`;
      geojsonUrlInputEl.value = '';
      try {
        return JSON.parse(text);
      } catch (error) {
        throw new Error(`Invalid JSON in uploaded file ${file.name}: ${toErrorMessage(error)}`);
      }
    }

    async function loadSheet() {
      const uploadedFile = csvFileInputEl.files && csvFileInputEl.files[0] ? csvFileInputEl.files[0] : null;
      if (uploadedFile) {
        const csvText = await readFileAsText(uploadedFile);
        currentSheetSource = `[file] ${uploadedFile.name}`;
        csvUrlInputEl.value = '';
        return normalize(parseCSV(csvText));
      }

      const requestedSource = getRequestedCsvSource();
      if (!requestedSource) {
        currentSheetSource = '[embedded fallback CSV]';
        lastSheetWarning = 'No CSV URL configured. Using embedded fallback CSV.';
        return normalize(parseCSV(FALLBACK_CSV));
      }

      currentSheetSource = requestedSource;
      const csvText = await fetchText(requestedSource);
      return normalize(parseCSV(csvText));
    }

    async function loadGeoJsonWithFallback() {
      const uploadedFile = geojsonFileInputEl.files && geojsonFileInputEl.files[0] ? geojsonFileInputEl.files[0] : null;
      if (uploadedFile) {
        lastGeoJsonWarning = '';
        return loadGeoJsonFromFile(uploadedFile);
      }

      const requestedSource = getRequestedGeoJsonSource();
      try {
        lastGeoJsonWarning = '';
        return await loadGeoJsonFromSource(requestedSource);
      } catch (error) {
        if (requestedSource === DEFAULT_GEOJSON_URL) {
          currentGeoJsonSource = '[fallback demo data]';
          lastGeoJsonWarning = `GeoJSON fetch failed. Showing fallback demo polygons. (${toErrorMessage(error)})`;
          return cloneFeatureCollection(FALLBACK_GEOJSON);
        }
        throw error;
      }
    }

    async function load() {
      clearDataAndLayers();
      lastSheetWarning = '';
      lastGeoJsonWarning = '';

      try {
        setStatus('Loading map data...');
        sheetMap = await loadSheet();
      } catch (error) {
        sheetMap = normalize(parseCSV(FALLBACK_CSV));
        currentSheetSource = '[embedded fallback CSV]';
        lastSheetWarning = `CSV load failed. Using embedded fallback CSV. (${toErrorMessage(error)})`;
      }

      try {
        geojsonData = await loadGeoJsonWithFallback();
        if (!geojsonData || !Array.isArray(geojsonData.features)) {
          throw new Error('GeoJSON must contain a features array.');
        }
      } catch (error) {
        console.error(error);
        clearDataAndLayers();
        setStatus(`Load failed: ${toErrorMessage(error)}`, true);
        return;
      }

      render();
    }

    function runTests() {
      console.assert(typeof DEFAULT_SHEET_CSV_URL === 'string', 'Test failed: DEFAULT_SHEET_CSV_URL must be defined');
      console.assert(JSON.stringify(splitCSVLine('a,b,c')) === JSON.stringify(['a', 'b', 'c']), 'Test failed: simple CSV split');
      console.assert(JSON.stringify(splitCSVLine('a,"b,c",d')) === JSON.stringify(['a', 'b,c', 'd']), 'Test failed: quoted CSV split');
      console.assert(sanitizeHeader('\uFEFFLot_ID') === 'Lot_ID', 'Test failed: BOM header sanitization');
      console.assert(getColor(0, 100, 'ACTIVE') === '#dc2626', 'Test failed: red color threshold');
      console.assert(getColor(20, 100, 'ACTIVE') === '#f59e0b', 'Test failed: orange color threshold');
      console.assert(getColor(80, 100, 'ACTIVE') === '#16a34a', 'Test failed: green color threshold');
      console.assert(getColor(10, 0, 'ACTIVE') === '#64748b', 'Test failed: unknown color when total is zero');
      console.assert(getFeatureLotId({ properties: { Lot_ID: 123 } }) === 123, 'Test failed: feature Lot_ID extraction');
      console.assert(getFeatureLotId({ properties: { lot_id: 456 } }) === 456, 'Test failed: feature lot_id extraction');
      console.assert(resolveUrl('lots.geojson').endsWith('/lots.geojson'), 'Test failed: local URL resolution');
      console.assert(parseCSV('title\nLot_ID,Cluster_Name,Total_Slots,Available_Slots,Status\n1,France,100,20,ACTIVE').length === 1, 'Test failed: CSV parser should find header row after title');
      console.assert(normalize([{ Lot_ID: '7', Cluster_Name: 'Russia', Cluster_Code: 'RUS', Cluster_Lot: '8', Lot_Name: 'RUS 8', Total_Slots: '100', Available_Slots: '55', Status: 'ACTIVE' }]).get(7).lotName === 'RUS 8', 'Test failed: normalize should map lot name');
      console.assert(FALLBACK_GEOJSON.features.length === 4, 'Test failed: fallback GeoJSON should contain demo features');
      console.assert(getFeatureLotId(FALLBACK_GEOJSON.features[0]) === 1, 'Test failed: fallback GeoJSON feature ID extraction');
      console.assert(parseCSV('Parking Lot Master\n\nLot_ID,Cluster_Name,Total_Slots,Available_Slots,Status\n1,France,100,20,ACTIVE\n').length === 1, 'Test failed: CSV parser should ignore title and blank rows');
      console.assert(normalize(parseCSV(FALLBACK_CSV)).size === 4, 'Test failed: fallback CSV should normalize into 4 lots');
      console.assert(toErrorMessage(new TypeError('Load failed')) === 'Load failed', 'Test failed: error message normalization');
      console.assert(cloneFeatureCollection(FALLBACK_GEOJSON) !== FALLBACK_GEOJSON, 'Test failed: cloned feature collection should be a new object');
      console.assert(getRequestedCsvSource() === DEFAULT_SHEET_CSV_URL, 'Test failed: requested CSV source should fall back to default constant');
      console.assert(getRequestedGeoJsonSource() === DEFAULT_GEOJSON_URL, 'Test failed: requested GeoJSON source should fall back to default constant');
      console.assert(normalize(parseCSV('Lot_ID,Cluster_Name,Cluster_Code,Cluster_Lot,Lot_Name,Total_Slots,Available_Slots,Status\n9,Italy,ITA,3,ITA 3,100,88,ACTIVE')).get(9).available === 88, 'Test failed: normalize should parse available slots');
    }

    filterEl.addEventListener('change', render);
    map.on('zoomend', render);
    reloadButtonEl.addEventListener('click', load);
    useLocalButtonEl.addEventListener('click', () => {
      geojsonFileInputEl.value = '';
      geojsonUrlInputEl.value = '';
      currentGeoJsonSource = DEFAULT_GEOJSON_URL;
      lastGeoJsonWarning = '';
      load();
    });

    const queryGeoJsonSource = getGeoJsonSourceFromQuery();
    if (queryGeoJsonSource) {
      currentGeoJsonSource = queryGeoJsonSource;
      geojsonUrlInputEl.value = queryGeoJsonSource;
    }

    const queryCsvSource = getCsvSourceFromQuery();
    if (queryCsvSource) {
      csvUrlInputEl.value = queryCsvSource;
    }

    runTests();
    load();
  </script>
</body>
</html>

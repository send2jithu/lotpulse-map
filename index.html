<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>LotPulse Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map { height:100vh; }
</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([25.1615,55.404],16);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

fetch("lots.geojson")
.then(r=>r.json())
.then(data=>{
L.geoJSON(data,{
style:{
color:"#ff6600",
weight:2,
fillOpacity:0.35
}
}).addTo(map);
});

</script>

</body>
</html>
